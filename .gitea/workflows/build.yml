name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repository info
        run: |
          echo "Репозиторий: ${{ github.repository }}"
          echo "Ветка: ${{ github.ref_name }}"
          echo "Коммит: ${{ github.sha }}"
          echo "Дата и время: $(date)"

      - name: Create test file
        run: |
          mkdir -p build
          echo "Билд номер: ${{ github.run_id }}" > build/info.txt
          echo "Коммит: ${{ github.sha }}" >> build/info.txt
          echo "Дата сборки: $(date)" >> build/info.txt
          cat build/info.txt

      - name: Docker build test
        run: |
          echo "FROM alpine:latest" > Dockerfile
          echo "RUN echo 'Hello from Gitea CI/CD!' > /hello.txt" >> Dockerfile
          echo "CMD cat /hello.txt" >> Dockerfile
          docker build -t test-app:${{ github.sha }} .
          docker run --rm test-app:${{ github.sha }}
