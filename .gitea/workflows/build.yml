name: CI/CD Pipeline

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Show repository info
        run: |
          echo "Репозиторий: ${{ github.repository }}"
          echo "Ветка: ${{ github.ref_name }}"
          echo "Коммит: ${{ github.sha }}"

      - name: Create Dockerfile
        run: |
          echo "FROM alpine:latest" > Dockerfile
          echo "RUN echo 'Hello from Gitea Actions CI/CD!' > /hello.txt" >> Dockerfile
          echo "CMD cat /hello.txt" >> Dockerfile

      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .

      - name: Verify image
        run: docker run --rm my-app:${{ github.sha }}
